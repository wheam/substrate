# zone.schema.yaml — governance/zones.md 顶部 YAML 块里每个 zone 条目的契约
# 原则：字段从最小集起步，需要再长。wiki-doctor / skill-sync 解析这个，不去猜 markdown 表格。
type: object
required: [id, path, schema, maintainer_skill, readers, writers]
properties:
  id:              { type: string, description: "zone 唯一标识，如 collections" }
  path:            { type: string, description: "相对仓库根的目录，如 collections/" }
  purpose:         { type: string, description: "一句话用途" }
  schema:          { type: string, description: "本区内容 schema 版本，如 collection-zone-v1" }
  maintainer_skill:{ type: string, description: "负责维护的 skill 名" }
  readers:         { type: array, items: { enum: [hermes, claude-code, codex, all] } }
  writers:         { type: array, items: { enum: [hermes, claude-code, codex, all] } }
  disposition:     { enum: [canonical, reference], default: canonical }
  privacy:         { enum: [public, internal, private, sensitive], default: private }
