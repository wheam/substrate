# adapter.yaml — hermes（Nous Research Hermes，最小但真实）
# Hermes 把 skill 装进 ~/.hermes/skills/（见 adapters/README.md）。
# 接口未定稿：等真实 Hermes 机逼出抽象再固化。
# 解析约定同引擎其它契约（python3 标准库正则可读，不假设 PyYAML）。

adapter: hermes
kind: skill-runtime
runtime: hermes               # 写进 skill 的 target_runtimes / fleet device 的 runtimes 的值

# ── skill 装到哪 ──────────────────────────────────────────
skill_install:
  format: directory           # 每个 skill = 一个含 SKILL.md 的目录；与引擎 skills/ 同构
  target: "~/.hermes/skills"  # Hermes 用户级 skill 目录
  target_env_override: "HERMES_SKILL_DIR"
  sync_command: "python3 <substrate-sync>/sync.py --src <instance>/skills --target ~/.hermes/skills --runtime hermes"
  variant_suffix: ".hermes.md"

# ── 怎么探测本机 runtime / 角色 ───────────────────────────
detect:
  method: path-probe
  present_if_any:
    - "PATH 中存在可执行 `hermes`"
    - "目录 ~/.hermes/ 存在"
  role_source: "fleet/ 里本机 device 的 role 字段"

# ── 本地安装清单存哪（不入库）─────────────────────────────
local_manifest:
  path: "~/.hermes/skills/installed-skills.json"
  committed: false
  gitignored_by_template: true   # template/.gitignore 已含 installed-skills.json

# ── 常驻上下文注入（substrate-runtime-context）────────────
# 让 Hermes 开工自动加载库摘要（关于主人记忆 + 各区速览 + 路由表 + 房规）。
# 注入点【已在真机验证 2026-06-27】（源码 agent/prompt_builder.py build_context_files_prompt）：
#   Hermes 原生 context-file 机制——网关进程 cwd = HERMES_HOME(~/.hermes)，每条消息自动加载该目录下的
#   `.hermes.md`（优先级最高，walk-to-git-root），加载前做 prompt-injection 安全扫描，每源上限 20000 字符。
#   => 把小抄写进 ~/.hermes/.hermes.md 即被注入：【无需改 config.yaml、无需重启、逐条消息生效】。
#   SOUL.md 是独立的人设槽位（也每条消息加载）——故意不碰它，保持人设与库知识分离。
runtime_context:
  default_on: true                                  # 对话型助理默认接；cc/codex 默认关
  generator: "python3 <instance>/skills/substrate-runtime-context/render-context.py <instance>"
  digest_file: "~/.hermes/.hermes.md"               # Hermes 原生 context 文件（网关 cwd 下，自动加载）
  digest_file_env_override: "HERMES_SUBSTRATE_CONTEXT"
  inject_via: "原生 context-file：网关 cwd=~/.hermes 下的 .hermes.md 每条消息自动加载（≤20000 字符，安全扫描后注入）；无需改 config、无需重启"
  injection_cap_chars: 20000                         # Hermes 端硬上限（CONTEXT_FILE_MAX_CHARS）；小抄护栏 12000 安全落在内
  refresh: "launchd/cron 或 Hermes 内置 cron 定时跑：git pull + wire-context.py --apply（无 per-message shell hook，故用定时刷新）"

notes: >
  最小声明：路径为占位约定，待在真实 Hermes 机上验证后固化。
  Substrate 的目标之一就是「不绑死 Hermes」——本 adapter 让 Hermes 与 claude-code / codex 平级接入。
